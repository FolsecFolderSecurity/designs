<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<body class="auth-bg">

<div class="auth-card">

    <div class="logo">
        <img src="assets/logo.png" alt="Logo">
    </div>

    <h1>Hemen Kayıt Ol!</h1>

    <p class="description">
        Lorem ipsum dolor sit amet, consectetur adipiscing elit.
    </p>

    <form id="registerForm">

        <div class="form-group">
            <label>Ad ve Soyad</label>
            <input type="text" id="fullname" placeholder="Adınız ve soyadınız" required>
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Kullanıcı adınız" required>
        </div>

        <div class="form-group">
            <label>E-posta Adresi</label>
            <input type="email" id="email" placeholder="E-posta adresiniz" required>
        </div>

        <div class="form-group">
            <label>Şifre</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Şifrenizi girin" required>
                <span class="toggle-password" data-target="password">👁</span>
            </div>
        </div>

        <div class="form-group">
            <label>Şifre Tekrar</label>
            <div class="password-wrapper">
                <input type="password" id="passwordConfirm" placeholder="Şifrenizi tekrar girin" required>
                <span class="toggle-password" data-target="passwordConfirm">👁</span>
            </div>
        </div>

        <div class="form-group">
            <label>Ülkenizi Seçin</label>
            <select id="country" required>
                <option value="">Ülke seçin</option>
                <option value="tr">Türkiye</option>
                <option value="de">Almanya</option>
                <option value="us">Amerika</option>
                <option value="uk">İngiltere</option>
            </select>
        </div>

        <button type="submit">Kayıt Ol</button>

    </form>

    <p class="terms">
        İlerlediğiniz zaman Gizlilik Sözleşmemizi kabul etmiş sayılırsınız
    </p>

    <p class="register">
        Zaten hesabın var mı? <a href="login.html">Giriş Yap</a>
    </p>

</div>
</body>

<script src="js/main.js"></script>
</body>
</html>
