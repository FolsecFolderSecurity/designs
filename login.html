<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- CSS -->
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/layout.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<body class="auth-bg">
    
<div class="login-card">

    <div class="logo">
        <img src="assets/logo.png" alt="Logo">
    </div>

    <div class="welcome-badge">
        👋 Hoşgeldin!
    </div>

    <h1>Hemen Giriş Yap!</h1>

    <p class="description">
        Lorem ipsum dolor sit amet, consectetur adipiscing elit.
    </p>

    <form id="loginForm">

        <div class="form-group">
            <label>E-posta Adresi</label>
            <input type="email" id="email" placeholder="E-posta adresiniz" required>
        </div>

        <div class="form-group">
            <label>Şifre</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Şifrenizi girin" required>
                <span class="toggle-password" id="togglePassword">👁</span>
            </div>
        </div>

        <div class="row">
            <div class="checkbox-wrapper">
                <input type="checkbox" id="remember">
                <label for="remember">Beni hatırla</label>
            </div>

            <a href="reset-password.html" class="forgot">Şifremi unuttum?</a>
        </div>

<a href="demo.html">
    <button type="button">Giriş Yap</button>
</a>
    </form>

    <p class="terms">
        İlerlediğiniz zaman Gizlilik Sözleşmemizi kabul etmiş sayılırsınız
    </p>

  <p class="register">
  Henüz hesabın yok mu? <a href="register.html" class="register-link">Kayıt Ol</a>
</p>

</div>
</body>

<script src="js/main.js"></script>
</body>
</html>
