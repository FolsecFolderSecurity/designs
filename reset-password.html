<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<body class="auth-bg">

<div class="login-card">

    <div class="logo">
        <img src="assets/logo.png" alt="Logo">
    </div>

    <div class="welcome-badge">
        👋 Şifremi Unuttum!
    </div>

    <h1>Şifremi Sıfırla!</h1>

    <p class="description">
        Lorem ipsum dolor sit amet, consectetur adipiscing elit.
    </p>

    <form id="loginForm">

        <div class="form-group">
            <label>E-posta Adresi</label>
            <input type="email" id="email" placeholder="E-posta adresiniz" required>
        </div>

 


        <button type="submit">Sıfırlama Linki Gönder</button>

    </form>

    <p class="terms">
        İlerlediğiniz zaman Gizlilik Sözleşmemizi kabul etmiş sayılırsınız
    </p>

  <p class="register">
  Şifreni hatırlamıyor musun? <a href="login.html" class="register-link">Giriş Yap</a>
</p>

</div>
</body>

<script src="js/main.js"></script>
</body>
</html>
